<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Document Pipeline â€” Flow Visualization</title>
<style>
:root {
  --bg: #060d1e;
  --surface: #0d1b35;
  --surface2: #131f3a;
  --border: #1a2d4f;
  --text: #d4e2f7;
  --muted: #4a6080;
  --accent: #00d4ff;
  /* Category colors */
  --c-data-in:    #38bdf8;
  --c-data-br:    #22c55e;
  --c-data-mid:   #64748b;
  --c-data-out:   #34d399;
  --c-extract:    #fb923c;
  --c-docx:       #fb7185;
  --c-pydocx:     #a78bfa;
  --c-external:   #22d3ee;
  --c-orch:       #fbbf24;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* â”€â”€ HEADER â”€â”€ */
.hdr {
  height: 52px;
  background: rgba(6,13,30,.9);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 18px;
  flex-shrink: 0;
  backdrop-filter: blur(8px);
  z-index: 200;
}
.hdr-title {
  font-family: 'Consolas','Courier New',monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
}
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-left: 24px;
}
.lg { display:flex; align-items:center; gap:5px; font-size:10.5px; color:var(--muted); white-space:nowrap; }
.lg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
.hdr-hint { margin-left:auto; font-size:10px; color:var(--muted); white-space:nowrap; }

/* â”€â”€ MAIN â”€â”€ */
.main { flex:1; display:flex; overflow:hidden; }

/* â”€â”€ CANVAS â”€â”€ */
.canvas-wrap {
  flex:1;
  overflow:auto;
  position:relative;
  cursor:grab;
  user-select:none;
}
.canvas-wrap:active { cursor:grabbing; }
#stage {
  position:relative;
  width:2260px;
  height:1280px;
}

/* Grid background */
#stage::before {
  content:'';
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events:none;
}

#svg-arrows {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:visible;
}

/* â”€â”€ SECTION LABELS â”€â”€ */
.sec-label {
  position:absolute;
  font-family:'Consolas','Courier New',monospace;
  font-size:9px;
  font-weight:700;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
  opacity:.5;
  pointer-events:none;
}

/* â”€â”€ SECTION BG â”€â”€ */
.sec-bg {
  position:absolute;
  border-radius:14px;
  border:1px solid;
  pointer-events:none;
}

/* â”€â”€ NODES â”€â”€ */
.node {
  position:absolute;
  border-radius:9px;
  border:1.5px solid;
  padding:9px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform .18s, filter .18s, box-shadow .18s;
}
.node:hover {
  transform:translateY(-2px);
  filter:brightness(1.18);
  z-index:20;
}
.node.active {
  outline:2px solid var(--accent);
  outline-offset:3px;
  z-index:20;
}
.n-icon { font-size:15px; display:block; margin-bottom:3px; line-height:1; }
.n-label {
  font-family:'Consolas','Courier New',monospace;
  font-size:10px;
  font-weight:700;
  line-height:1.35;
  letter-spacing:.02em;
}
.n-sub {
  font-size:9px;
  opacity:.6;
  margin-top:2px;
  line-height:1.3;
  font-family:'Consolas','Courier New',monospace;
}

/* Node category styles */
.cat-data-in   { background:rgba(56,189,248,.07);  border-color:#38bdf8; color:#93c5fd; }
.cat-data-br   { background:rgba(34,197,94,.09);   border-color:#22c55e; color:#86efac; }
.cat-data-mid  { background:rgba(100,116,139,.08); border-color:#475569; color:#94a3b8; }
.cat-data-out  { background:rgba(52,211,153,.11);  border-color:#34d399; color:#6ee7b7; }
.cat-extract   { background:rgba(251,146,60,.07);  border-color:#fb923c; color:#fdba74; }
.cat-docx      { background:rgba(251,113,133,.07); border-color:#fb7185; color:#fda4af; }
.cat-pydocx    { background:rgba(167,139,250,.09); border-color:#a78bfa; color:#c4b5fd; }
.cat-external  { background:rgba(34,211,238,.07);  border-color:#22d3ee; color:#67e8f9; border-style:dashed; }
.cat-orch      { background:rgba(251,191,36,.08);  border-color:#fbbf24; color:#fde68a; }

/* â”€â”€ DETAIL PANEL â”€â”€ */
.panel {
  width:360px;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  overflow:hidden;
}
.panel.open { transform:translateX(0); }
.panel-hdr {
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-close {
  float:right;
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:17px;
  line-height:1;
  margin-top:-2px;
  transition:color .15s;
}
.panel-close:hover { color:var(--text); }
.panel-cat {
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.15em;
  color:var(--muted);
  margin-bottom:5px;
  font-family:'Consolas','Courier New',monospace;
}
.panel-title {
  font-family:'Consolas','Courier New',monospace;
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  line-height:1.4;
}
.panel-body { flex:1; overflow-y:auto; padding:16px 20px; }
.p-sec { margin-bottom:18px; }
.p-sec-title {
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.18em;
  color:var(--muted);
  margin-bottom:7px;
  padding-bottom:4px;
  border-bottom:1px solid var(--border);
  font-family:'Consolas','Courier New',monospace;
}
.p-sec-body { font-size:11.5px; line-height:1.65; color:#8ba3c4; }
.chip {
  display:inline-block;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:4px;
  padding:2px 7px;
  font-size:9.5px;
  margin:2px 2px 2px 0;
  color:#8ba3c4;
  font-family:'Consolas','Courier New',monospace;
  line-height:1.5;
}
.code-block {
  background:rgba(0,0,0,.45);
  border:1px solid var(--border);
  border-radius:6px;
  padding:10px 12px;
  font-size:10px;
  line-height:1.75;
  color:#c8d8ef;
  white-space:pre;
  overflow-x:auto;
  font-family:'Consolas','Courier New',monospace;
  margin-top:6px;
}
.tag-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.returns-val { color:#86efac; font-family:'Consolas','Courier New',monospace; font-size:11px; }
</style>
</head>

// Arrow helpers
function cx(n) { return n.x + n.w/2; }
function cy(n) { return n.y + n.h/2; }
function rightAnchor(n) { return {x: n.x+n.w, y: n.y+n.h/2}; }
function leftAnchor(n)  { return {x: n.x,     y: n.y+n.h/2}; }
function bottomAnchor(n){ return {x: n.x+n.w/2, y: n.y+n.h}; }
function topAnchor(n)   { return {x: n.x+n.w/2, y: n.y}; }

function bestAnchors(s, t) {
  const dx = cx(t) - cx(s);
  const dy = cy(t) - cy(s);
  if (Math.abs(dx) >= Math.abs(dy)) {
    if (dx > 0) return [rightAnchor(s), leftAnchor(t)];
    else        return [leftAnchor(s),  rightAnchor(t)];
  } else {
    if (dy > 0) return [bottomAnchor(s), topAnchor(t)];
    else        return [topAnchor(s),    bottomAnchor(t)];
  }
}

}

// Draw edges

  const s = nodeMap[e.f], t = nodeMap[e.t];
  if (!s || !t) return;
  const [a1, a2] = bestAnchors(s, t);
  const dx = a2.x - a1.x, dy = a2.y - a1.y;
  let cp1x, cp1y, cp2x, cp2y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    const bend = Math.min(Math.abs(dx)*0.4, 80);
    cp1x = a1.x + bend; cp1y = a1.y;
    cp2x = a2.x - bend; cp2y = a2.y;
  } else {
    const bend = Math.min(Math.abs(dy)*0.4, 80);
    cp1x = a1.x; cp1y = a1.y + bend;
    cp2x = a2.x; cp2y = a2.y - bend;
  }
  const mid = colorToMarkerId(e.clr);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M${a1.x},${a1.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${a2.x},${a2.y}`);
  path.setAttribute('stroke', e.clr);
  path.setAttribute('stroke-width','1.4');
  path.setAttribute('fill','none');
  path.setAttribute('opacity','.55');
  path.setAttribute('marker-end',`url(#${mid})`);
  svg.appendChild(path);

  // edge label
  const lx = (a1.x+a2.x)/2, ly = (a1.y+a2.y)/2;
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', lx); txt.setAttribute('y', ly-4);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill', e.clr);
  txt.setAttribute('font-size','8.5');
  txt.setAttribute('font-family',"'Consolas','Courier New',monospace");
  txt.setAttribute('opacity','.55');
  txt.textContent = e.lbl;
  svg.appendChild(txt);
});

//  DETAIL PANEL
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const panel = document.getElementById('panel');
const pCat = document.getElementById('pCat');
const pTitle = document.getElementById('pTitle');
const pBody = document.getElementById('pBody');
let activeNode = null;

function showDetail(id) {
  const n = nodeMap[id];
  if (!n) return;
  if (activeNode) document.getElementById(`node-${activeNode}`)?.classList.remove('active');
  activeNode = id;
  document.getElementById(`node-${id}`)?.classList.add('active');

  pCat.textContent = CAT_LABEL[n.cat] || n.cat;
  pTitle.textContent = n.label;

  const d = n.d;
  let html = '';

  html += sec('Peran', `<div class="p-sec-body">${d.role}</div>`);
  html += sec('File', `<div class="p-sec-body" style="font-family:\'Consolas\',monospace;font-size:11px;color:#67e8f9">${d.file}</div>`);
  html += sec('Deskripsi', `<div class="p-sec-body">${d.desc}</div>`);

  if (d.schema && d.schema.length) {
    html += sec('Schema / Field', `<div class="tag-row">${d.schema.map(s=>`<span class="chip">${s}</span>`).join('')}</div>`);
  }
  if (d.params && d.params.length) {
    html += sec('Parameter Input', `<div class="tag-row">${d.params.map(p=>`<span class="chip">${p}</span>`).join('')}</div>`);
  }
  if (d.returns) {
    html += sec('Return Value', `<div class="returns-val">${d.returns}</div>`);
  }
  if (d.code) {
    html += sec('Kode Kunci', `<div class="code-block">${escHtml(d.code)}</div>`);
  }

  pBody.innerHTML = html;
  panel.classList.add('open');
}

function sec(title, content) {
  return `<div class="p-sec"><div class="p-sec-title">${title}</div>${content}</div>`;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('panelClose').addEventListener('click', () => {
  panel.classList.remove('open');
  if (activeNode) { document.getElementById(`node-${activeNode}`)?.classList.remove('active'); activeNode = null; }
});

//  PAN SUPPORT
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const wrap = document.getElementById('canvasWrap');
let panning = false, panStart = {x:0,y:0}, scrollStart = {x:0,y:0};

wrap.addEventListener('mousedown', e => {
  if (e.target.classList.contains('node') || e.target.closest('.node')) return;
  panning = true;
  panStart = {x:e.clientX, y:e.clientY};
  scrollStart = {x:wrap.scrollLeft, y:wrap.scrollTop};
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  wrap.scrollLeft = scrollStart.x - (e.clientX - panStart.x);
  wrap.scrollTop  = scrollStart.y - (e.clientY - panStart.y);
});
window.addEventListener('mouseup', () => { panning = false; });
</script>
